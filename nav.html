<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>书签导航生成器 · BMM 风格</title>
    <style>
        /* ============================================================
           GLOBAL RESET & VARIABLES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #06111b;
            --bg-secondary: rgba(255, 255, 255, 0.04);
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-hover: rgba(255, 255, 255, 0.10);
            --bg-sidebar: rgba(255, 255, 255, 0.04);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.3);
            --radius-card: 16px;
            --radius-btn: 8px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --sidebar-width: 240px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
                "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ============================================================
           BG EFFECTS
           ============================================================ */
        .bg-effects {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-effects .glow1 {
            position: absolute;
            top: -6vmin;
            right: -8vmin;
            width: 52vmin;
            height: 52vmin;
            background: radial-gradient(circle at center, rgba(167, 139, 250, 0.12), transparent 66%);
        }
        .bg-effects .glow2 {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 62vmin;
            height: 62vmin;
            transform: translate(-25%, 25%);
            background: radial-gradient(circle at center, rgba(45, 212, 191, 0.08), transparent 68%);
        }

        /* ============================================================
           APP CONTAINER
           ============================================================ */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 20px 20px;
        }

        /* ============================================================
           TOOLBAR
           ============================================================ */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toolbar-left .brand {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .toolbar-left .brand small {
            font-weight: 400;
            font-size: 13px;
            -webkit-text-fill-color: var(--text-muted);
            color: var(--text-muted);
            margin-left: 6px;
        }
        .toolbar-stats {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .toolbar-stats span {
            color: var(--text-muted);
            margin: 0 2px;
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-btn);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            user-select: none;
            white-space: nowrap;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }
        .btn-success {
            background: #0d9488;
            border-color: #0d9488;
            color: #fff;
        }
        .btn-success:hover {
            background: #0f766e;
            border-color: #0f766e;
            color: #fff;
        }
        .btn-icon {
            font-size: 16px;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ============================================================
           UPLOAD ZONE (visible when no bookmarks)
           ============================================================ */
        .upload-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 480px;
            border: 2px dashed var(--border-color);
            border-radius: 24px;
            background: var(--bg-secondary);
            transition: var(--transition);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
        }
        .upload-zone:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }
        .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(79, 70, 229, 0.08);
        }
        .upload-zone .icon-big {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }
        .upload-zone h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .upload-zone p {
            color: var(--text-secondary);
            max-width: 400px;
            margin-bottom: 4px;
        }
        .upload-zone .hint {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }
        .upload-zone .format {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-top: 12px;
            display: inline-block;
        }
        .upload-zone input[type="file"] {
            display: none;
        }

        /* ============================================================
           NAVIGATION PREVIEW (visible when bookmarks loaded)
           ============================================================ */
        .nav-preview {
            flex: 1;
            display: none;
            flex-direction: column;
            min-height: 0;
        }
        .nav-preview.visible {
            display: flex;
        }

        .nav-body {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            position: sticky;
            top: 0;
            width: var(--sidebar-width);
            height: calc(100vh - 160px);
            flex-shrink: 0;
            background: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 0 8px 14px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .sidebar-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .sidebar-header .logo span {
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-header .badge {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            padding-left: 2px;
        }
        .sidebar-search {
            padding: 12px 0 8px;
            flex-shrink: 0;
        }
        .sidebar-search input {
            width: 100%;
            padding: 7px 12px;
            font-size: 13px;
            font-family: inherit;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }
        .sidebar-search input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        .sidebar-search input::placeholder {
            color: var(--text-muted);
        }
        .sidebar-tags {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .sidebar-tag {
            display: flex;
            align-items: center;
            padding: 7px 12px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-secondary);
            transition: var(--transition);
            cursor: pointer;
            gap: 10px;
            font-size: 13px;
            font-weight: 450;
        }
        .sidebar-tag:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            transform: translateX(2px);
        }
        .sidebar-tag.active {
            background: rgba(79, 70, 229, 0.15);
            color: var(--text-primary);
        }
        .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tag-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tag-count {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.06);
            padding: 0 8px;
            border-radius: 10px;
            line-height: 18px;
            flex-shrink: 0;
        }
        .sidebar-footer {
            padding: 12px 8px 0;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ---- Main Content ---- */
        .main-content {
            flex: 1;
            min-width: 0;
            padding: 0 0 40px;
            overflow-y: auto;
            max-height: calc(100vh - 160px);
        }
        .main-content::-webkit-scrollbar {
            width: 4px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .main-header {
            padding: 6px 0 18px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .main-header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }
        .main-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Search Engines */
        .search-engines {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .search-engines .label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-right: 4px;
        }
        .search-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            font-size: 12px;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-btn);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .search-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }
        .search-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .search-btn .search-icon {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .search-btn .si-fallback {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* Search Input */
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0 18px;
        }
        .search-wrapper input {
            flex: 1;
            padding: 9px 16px;
            font-size: 14px;
            font-family: inherit;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }
        .search-wrapper input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        .search-wrapper input::placeholder {
            color: var(--text-muted);
        }
        .search-wrapper .shortcut {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        /* Category Section */
        .category-section {
            margin-bottom: 28px;
            scroll-margin-top: 12px;
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .category-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .category-title {
            font-size: 18px;
            font-weight: 600;
        }
        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* Bookmarks Grid */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        /* Bookmark Card */
        .bookmark-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            transition: var(--transition);
            overflow: hidden;
        }
        .bookmark-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-card);
        }
        .bookmark-card.hidden {
            display: none;
        }

        .card-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
            text-decoration: none;
            color: inherit;
        }
        .card-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .card-icon .fallback-icon {
            font-size: 18px;
        }
        .card-content {
            flex: 1;
            min-width: 0;
        }
        .card-title {
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-domain {
            font-size: 11px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        .no-results .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }
        }

        @media (max-width: 820px) {
            .app-container {
                padding: 12px 16px;
            }
            .nav-body {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                max-height: 260px;
                margin-bottom: 16px;
                border-radius: 16px;
            }
            .main-content {
                max-height: none;
                padding-bottom: 20px;
            }
            .bookmarks-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar-actions {
                justify-content: flex-start;
            }
        }

        @media (max-width: 480px) {
            .bookmarks-grid {
                grid-template-columns: 1fr 1fr;
            }
            .main-header h1 {
                font-size: 22px;
            }
            .search-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
            .search-wrapper .shortcut {
                align-self: flex-end;
            }
            .search-engines {
                justify-content: center;
            }
            .upload-zone {
                min-height: 320px;
                padding: 32px 16px;
            }
            .upload-zone .icon-big {
                font-size: 48px;
            }
        }

        @media (max-width: 380px) {
            .bookmarks-grid {
                grid-template-columns: 1fr;
            }
        }

        .hidden {
            display: none !important;
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.error {
            border-color: #ef4444;
        }
        .toast.success {
            border-color: #22c55e;
        }
    </style>
</head>
<body>

    <!-- ===== BG EFFECTS ===== -->
    <div class="bg-effects">
        <div class="glow1"></div>
        <div class="glow2"></div>
    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <!-- ===== APP ===== -->
    <div class="app-container">

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="brand">
                    [Bookmark] 书签导航
                    <small>BMM 风格</small>
                </div>
                <div class="toolbar-stats" id="statsBar">
                    <span>[INFO] 等待上传</span>
                </div>
            </div>
            <div class="toolbar-actions">
                <button class="btn" id="uploadBtn" title="上传 Markdown 书签文件">
                    <span class="btn-icon">[U]</span> 上传
                </button>
                <button class="btn btn-success" id="exportBtn" disabled>
                    <span class="btn-icon">[D]</span> 导出 HTML
                </button>
                <input type="file" id="fileInput" accept=".md,.markdown" style="display:none" />
            </div>
        </div>

        <!-- Upload Zone (visible when no data) -->
        <div class="upload-zone" id="uploadZone">
            <span class="icon-big">[F]</span>
            <h2>上传 Markdown 书签文件</h2>
            <p>拖拽文件到此处，或点击上传</p>
            <p class="hint">支持 .md 或 .markdown</p>
            <div class="format">
                ## 分类名称  - [标题](链接)
            </div>
        </div>

        <!-- Navigation Preview (visible when data loaded) -->
        <div class="nav-preview" id="navPreview">
            <div class="nav-body">
                <!-- Sidebar -->
                <aside class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="logo">
                            <span>[B]</span>
                            <span id="sidebarTitle">我的导航</span>
                        </div>
                        <div class="badge" id="sidebarBadge">0 个书签</div>
                    </div>
                    <div class="sidebar-search">
                        <input type="text" id="sidebarSearch" placeholder="过滤标签..." autocomplete="off" />
                    </div>
                    <nav class="sidebar-tags" id="sidebarTags"></nav>
                    <div class="sidebar-footer" id="sidebarFooter">0 个分类</div>
                </aside>

                <!-- Main -->
                <main class="main-content" id="mainContent">
                    <div class="main-header">
                        <h1>[Star] 我的书签</h1>
                        <p>收纳 · 分享 · 探索</p>
                    </div>

                    <!-- Search Engines -->
                    <div class="search-engines" id="searchEngines">
                        <span class="label">[Search] 搜索：</span>
                    </div>

                    <!-- Search Input -->
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="搜索书签..." autocomplete="off" />
                        <span class="shortcut">[Cmd+K]</span>
                    </div>

                    <!-- Bookmarks Container -->
                    <div id="bookmarksContainer"></div>
                </main>
            </div>
        </div>

    </div>

    <script>
        // ================================================================
        //  UTILITY
        // ================================================================
        function escapeHTML(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function md5(str) {
            // Simple hash for color generation (non-crypto, just for consistency)
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return Math.abs(hash).toString(16).padStart(8, '0');
        }

        function getColorForCategory(category) {
            const colors = [
                '#ff1494', '#33bbff', '#ff2e2e', '#a442fa', '#b638ff', '#ebcb63',
                '#0066ff', '#eeefff', '#069b05', '#00ffcb', '#bfbfbf', '#191919',
                '#ffcc14', '#ffb13b', '#f0f0f0', '#fff3e0', '#13ae4f', '#ffffff',
                '#424cff', '#00d8ff', '#41b883', '#fbfbfb', '#f7df1e', '#e43718',
                '#9e9e9e', '#f0bb6e', '#1a97ef', '#e0feff', '#35bfce', '#c70000',
                '#a647ff', '#24a2ff', '#ffaa00', '#3f3fff', '#00ff00', '#ff00a8',
                '#75ffed', '#616161',
            ];
            const hash = md5(category);
            const idx = parseInt(hash.slice(0, 8), 16) % colors.length;
            return colors[idx];
        }

        function getDomain(url) {
            try {
                const u = new URL(url);
                let host = u.hostname;
                if (host.startsWith('www.')) host = host.slice(4);
                return host;
            } catch {
                return url.split('/')[0] || '';
            }
        }

        function getFaviconUrl(url) {
            try {
                const u = new URL(url);
                let host = u.hostname;
                if (host.startsWith('www.')) host = host.slice(4);
                return `https://api.lcll.cc/favicon?host=${host}`;
            } catch {
                return '';
            }
        }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + (type || '');
            // force reflow
            void el.offsetWidth;
            el.classList.add('show');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('show'), 2800);
        }

        // ================================================================
        //  MARKDOWN PARSER (same logic as Python version)
        // ================================================================
        function parseMarkdownBookmarks(content) {
            const lines = content.split(/\r?\n/);
            const bookmarks = [];
            let currentCategory = '';

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                // ## Category
                if (line.startsWith('## ')) {
                    currentCategory = line.slice(3).trim();
                    continue;
                }

                // - [Title](URL)
                if (line.startsWith('- [')) {
                    const match = line.match(/- \[([^\]]+)\]\(([^)]+)\)/);
                    if (match && currentCategory) {
                        bookmarks.push({
                            category: currentCategory,
                            title: match[1].trim(),
                            url: match[2].trim(),
                        });
                        continue;
                    }
                }

                // Handle multi-line: "-" on one line, "[Title](URL)" on next
                if (line === '-' && i + 1 < lines.length) {
                    const next = lines[i + 1].trim();
                    const match = next.match(/\[([^\]]+)\]\(([^)]+)\)/);
                    if (match && currentCategory) {
                        bookmarks.push({
                            category: currentCategory,
                            title: match[1].trim(),
                            url: match[2].trim(),
                        });
                        i++;
                        continue;
                    }
                }

                // Also handle "- Title (URL)" style? Not in original, but let's be lenient
                const altMatch = line.match(/^-?\s*\[([^\]]+)\]\(([^)]+)\)/);
                if (altMatch && currentCategory) {
                    bookmarks.push({
                        category: currentCategory,
                        title: altMatch[1].trim(),
                        url: altMatch[2].trim(),
                    });
                }
            }

            return bookmarks;
        }

        // ================================================================

        // ================================================================
        let currentBookmarks = [];

        // ================================================================

                a.addEventListener('click', function(e) {

            // ---- Search Engines ----

            // ---- Bookmarks content ----

                const header = document.createElement('div');
                header.className = 'category-header';

                    <span class="category-count">${items.length} 个书签</span>
                `;
                section.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'bookmarks-grid';

                for (const bm of items) {
                    const domain = getDomain(bm.url);
                    const favicon = getFaviconUrl(bm.url);

                    const card = document.createElement('div');
                    card.className = 'bookmark-card';
                    card.dataset.title = bm.title.toLowerCase();
                    card.dataset.domain = domain.toLowerCase();

                    const link = document.createElement('a');
                    link.className = 'card-link';
                    link.href = bm.url;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';

                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'card-icon';
                    const img = document.createElement('img');
                    img.src = favicon;
                    img.alt = '';
                    img.onerror = function() {
                        this.parentElement.innerHTML = `<span class="fallback-icon">[P]</span>`;
                    };
                    iconDiv.appendChild(img);
                    link.appendChild(iconDiv);

                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'card-content';
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'card-title';
                    titleDiv.textContent = bm.title;
                    const domainDiv = document.createElement('div');
                    domainDiv.className = 'card-domain';
                    domainDiv.textContent = domain;
                    contentDiv.appendChild(titleDiv);
                    contentDiv.appendChild(domainDiv);
                    link.appendChild(contentDiv);

                    card.appendChild(link);
                    grid.appendChild(card);
                }

                section.appendChild(grid);
                container.appendChild(section);
            }

            // ---- Show preview, hide upload ----
            document.getElementById('uploadZone').style.display = 'none';
            document.getElementById('navPreview').classList.add('visible');
            document.getElementById('exportBtn').disabled = false;

            // ---- Re-run filter ----
            filterBookmarks('');

            const firstTag = document.querySelector('.sidebar-tag');

            window.scrollTo({ top: 0, behavior: 'smooth' });

        // ================================================================
        //  FILTER BOOKMARKS (search)
        // ================================================================
        function filterBookmarks(keyword) {
            const kw = keyword.toLowerCase().trim();
            const sections = document.querySelectorAll('.category-section');
            let totalMatches = 0;

            for (const section of sections) {
                const cards = section.querySelectorAll('.bookmark-card');
                let sectionMatches = 0;
                for (const card of cards) {
                    const title = card.dataset.title || '';
                    const domain = card.dataset.domain || '';
                    const match = kw === '' || title.includes(kw) || domain.includes(kw);
                    card.classList.toggle('hidden', !match);
                    if (match) sectionMatches++;
                }
                totalMatches += sectionMatches;
                section.classList.toggle('hidden', kw !== '' && sectionMatches === 0);
            }

            // No results message
            let noResults = document.getElementById('noResults');
            if (totalMatches === 0 && kw !== '') {
                if (!noResults) {
                    noResults = document.createElement('div');
                    noResults.id = 'noResults';
                    noResults.className = 'no-results';
                    noResults.innerHTML = `<span class="icon">[S]</span><p>没有找到匹配的书签</p>`;
                    document.getElementById('bookmarksContainer').appendChild(noResults);
                }
            } else if (noResults) {
                noResults.remove();
            }
        }

        // ================================================================
        //  EXPORT HTML (generates full standalone page)
        // ================================================================
        function exportHTML() {
            if (!currentBookmarks.length) {
                showToast('[Error] 没有书签可导出', 'error');
                return;
            }

            // Re-use the same rendering logic but generate a full HTML string.
            // We'll build the HTML from scratch using the same data.
            const html = generateFullHTML(currentBookmarks, currentTitle);
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'nav.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('[Success] 导出成功！', 'success');
        }

                        sections.forEach(section => {

                            if (rect.top + window.scrollY <= scrollY) currentId = section.id;

                        sidebarTags.forEach(tag => {

                    window.addEventListener('scroll', highlightTag);
                    setTimeout(highlightTag, 100);

                    // Filter bookmarks
                    function filterBookmarks(kw) {
                        const keyword = kw.toLowerCase().trim();
                        let total = 0;
                        sections.forEach(section => {
                            const cards = section.querySelectorAll('.bookmark-card');
                            let matches = 0;
                            cards.forEach(card => {
                                const title = (card.dataset.title || '').toLowerCase();
                                const domain = (card.dataset.domain || '').toLowerCase();
                                const match = keyword === '' || title.includes(keyword) || domain.includes(keyword);

                                if (match) matches++;
                            });
                            total += matches;
                            section.classList.toggle('hidden', keyword !== '' && matches === 0);
                        });
                        let noResults = document.getElementById('noResults');
                        if (total === 0 && keyword !== '') {

                                noResults.id = 'noResults';
                                noResults.className = 'no-results';
                                noResults.innerHTML = '<span class="icon">[S]</span><p>没有找到匹配的书签</p>';

                        searchInput.addEventListener('input', function() { filterBookmarks(this.value); });

                    // Keyboard shortcuts

                        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                            e.preventDefault();
                            if (searchInput) { searchInput.focus(); searchInput.select(); }

                        if (e.key === 'Escape' && searchInput) {

        // ================================================================
        //  FILE UPLOAD HANDLING
        // ================================================================
        function handleFile(file) {
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            if (!['md', 'markdown'].includes(ext)) {
                showToast('[Warning] 请上传 .md 或 .markdown 文件', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const bookmarks = parseMarkdownBookmarks(content);
                    if (!bookmarks.length) {
                        showToast('[Warning] 未解析到书签，请检查格式', 'error');
                        return;
                    }
                    const title = file.name.replace(/\.[^.]+$/, '') || '我的导航';
                    renderNavigation(bookmarks, title);
                    showToast(`[Success] 成功导入 ${bookmarks.length} 个书签`, 'success');
                } catch (err) {
                    showToast('[Error] 解析失败: ' + err.message, 'error');
                    console.error(err);
                }
            };
            reader.onerror = function() {
                showToast('[Error] 读取文件失败', 'error');
            };
            reader.readAsText(file);
        }

        // ================================================================
        //  EVENT BINDINGS
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const uploadZone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const exportBtn = document.getElementById('exportBtn');
            const searchInput = document.getElementById('searchInput');
            const sidebarSearch = document.getElementById('sidebarSearch');

            // Upload button
            uploadBtn.addEventListener('click', function() {
                fileInput.click();
            });

            // File input
            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    handleFile(this.files[0]);
                }
                this.value = '';
            });

            // Drag & drop
            uploadZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });
            uploadZone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
            });
            uploadZone.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    handleFile(files[0]);
                }
            });
            uploadZone.addEventListener('click', function() {
                fileInput.click();
            });

            // Export
            exportBtn.addEventListener('click', exportHTML);

            // Search (main)
            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    filterBookmarks(this.value);
                });
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        const q = this.value.trim();
                        if (q) {
                            window.open(selectedEngine + encodeURIComponent(q), '_blank');
                        }
                    }
                });
            }

            // Sidebar search
            if (sidebarSearch) {
                sidebarSearch.addEventListener('input', function() {
                    const kw = this.value.toLowerCase().trim();
                    document.querySelectorAll('.sidebar-tag').forEach(tag => {
                        const name = tag.querySelector('.tag-name').textContent.toLowerCase();
                        tag.style.display = (kw === '' || name.includes(kw)) ? 'flex' : 'none';
                    });
                });
            }

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    if (searchInput) {
                        searchInput.focus();
                        searchInput.select();
                    }
                }
                if (e.key === 'Escape') {
                    if (searchInput) {
                        searchInput.value = '';
                        filterBookmarks('');
                        searchInput.blur();
                    }
                }
            });

            // Store title/domain in dataset for filtering (after render)
            // We'll re-run this after each render via a MutationObserver or just in render function.
            // Let's patch renderNavigation to also set dataset.
            const origRender = renderNavigation;
            renderNavigation = function(bookmarks, title) {
                origRender(bookmarks, title);
                // After render, set dataset for filtering
                document.querySelectorAll('.bookmark-card').forEach(card => {
                    const titleEl = card.querySelector('.card-title');
                    const domainEl = card.querySelector('.card-domain');
                    if (titleEl) card.dataset.title = titleEl.textContent.toLowerCase();
                    if (domainEl) card.dataset.domain = domainEl.textContent.toLowerCase();
                });
            };

            // Check if there's any initial data? No, wait for upload.
            console.log('[Bookmark] 书签导航生成器已加载，请上传 .md 文件');
        });
    </script>
</body>
</html>
