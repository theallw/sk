<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>书签导航 · HelloGitHub 风格</title>
    <style>
        /* ===== 全局重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #f6f8fa;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f2f5;
            --bg-sidebar: #ffffffcc;
            --bg-sidebar-hover: #eef1f4;
            --bg-tag-active: #e9ecf0;
            --text-primary: #24292f;
            --text-secondary: #57606a;
            --text-muted: #8b949e;
            --border-color: #d0d7de;
            --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
            --accent: #2d7aff;
            --accent-hover: #1c5ed6;
            --radius-card: 10px;
            --transition: 0.18s ease;
            --sidebar-width: 200px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 暗色主题 */
        [data-theme="dark"] {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #1c2333;
            --bg-sidebar: #161b22cc;
            --bg-sidebar-hover: #21262d;
            --bg-tag-active: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #b1bac4;
            --text-muted: #6e7681;
            --border-color: #30363d;
            --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: var(--font);
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 8px;
        }

        /* ===== 布局 ===== */
        .app {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px 20px 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 头部 — 极简 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 16px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.3px;
        }
        .header-brand .logo {
            background: var(--accent);
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-actions .badge {
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            user-select: none;
        }
        .btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--text-muted);
            color: var(--text-primary);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }
        .btn-icon {
            font-size: 16px;
            line-height: 1;
        }

        /* 主体：侧栏 + 内容 */
        .nav-body {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        /* ===== 侧栏 ===== */
        .sidebar {
            position: sticky;
            top: 12px;
            width: var(--sidebar-width);
            flex-shrink: 0;
            background: var(--bg-sidebar);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 10px;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
        }
        .sidebar-header {
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .sidebar-header .title {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-header .sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .sidebar-search {
            padding: 10px 0 6px;
            flex-shrink: 0;
        }
        .sidebar-search input {
            width: 100%;
            padding: 5px 10px;
            font-size: 13px;
            font-family: inherit;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }
        .sidebar-search input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 122, 255, 0.15);
        }
        .sidebar-tags {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .sidebar-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-weight: 450;
        }
        .sidebar-tag:hover {
            background: var(--bg-sidebar-hover);
            color: var(--text-primary);
        }
        .sidebar-tag.active {
            background: var(--bg-tag-active);
            color: var(--text-primary);
            font-weight: 500;
        }
        .tag-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tag-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tag-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 0 7px;
            border-radius: 12px;
            line-height: 17px;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }
        .sidebar-footer {
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-muted);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
        }

        /* ===== 主内容 ===== */
        .main-content {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            max-height: calc(100vh - 140px);
            padding-right: 4px;
        }

        .main-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .main-header h1 {
            font-size: 22px;
            font-weight: 650;
            letter-spacing: -0.3px;
        }
        .main-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 搜索栏 + 引擎 */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .search-bar input {
            flex: 1;
            min-width: 160px;
            padding: 7px 14px;
            font-size: 14px;
            font-family: inherit;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 122, 255, 0.12);
        }
        .search-bar .shortcut {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .search-engines {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .search-engines .label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            margin-right: 4px;
        }
        .search-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            font-size: 12px;
            font-family: inherit;
            font-weight: 450;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .search-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        .search-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .search-btn .search-icon {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            object-fit: cover;
        }
        .si-fallback {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            background: var(--bg-card-hover);
            color: var(--text-muted);
        }

        /* ===== 分类 & 卡片 (紧凑, 比例缩小) ===== */
        .category-section {
            margin-bottom: 24px;
            scroll-margin-top: 10px;
            transition: opacity 0.2s;
        }
        .category-section.targeted {
            animation: pulse 0.9s ease;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            30% { opacity: 0.4; }
            70% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-color);
        }
        .category-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .category-title {
            font-size: 16px;
            font-weight: 600;
        }
        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* 网格 — 更小更紧凑 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(156px, 1fr));
            gap: 8px;
        }

        .bookmark-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            transition: var(--transition);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        .bookmark-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-1px);
            border-color: var(--text-muted);
            box-shadow: var(--shadow-hover);
        }
        .bookmark-card.highlight {
            background: rgba(45, 122, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(45, 122, 255, 0.15);
        }
        .bookmark-card.hidden {
            display: none;
        }

        .card-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            text-decoration: none;
            color: inherit;
        }
        .card-icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
            border-radius: 6px;
            background: var(--bg-card-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-icon img {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }
        .card-icon .fallback-icon {
            font-size: 14px;
            opacity: 0.6;
        }
        .card-content {
            flex: 1;
            min-width: 0;
        }
        .card-title {
            font-size: 13px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-domain {
            font-size: 10px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .no-results {
            text-align: center;
            padding: 40px 16px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        /* ===== 上传区 (初始) ===== */
        .upload-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            border: 2px dashed var(--border-color);
            border-radius: 20px;
            background: var(--bg-card);
            transition: var(--transition);
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
        }
        .upload-zone:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
        }
        .upload-zone .icon-big {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .upload-zone h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .upload-zone p {
            color: var(--text-secondary);
            max-width: 360px;
            font-size: 14px;
        }
        .upload-zone .hint {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }
        .upload-zone .format {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-body);
            padding: 3px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }
        .upload-zone input[type="file"] {
            display: none;
        }

        .nav-preview {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        .nav-preview.visible {
            display: flex;
        }

        .hidden {
            display: none !important;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .app { padding: 12px 16px; }
            .nav-body { flex-direction: column; }
            .sidebar {
                position: relative;
                width: 100%;
                max-height: 220px;
                margin-bottom: 12px;
                backdrop-filter: none;
            }
            .main-content {
                max-height: none;
                padding-right: 0;
            }
            .bookmarks-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .header { flex-direction: column; align-items: stretch; gap: 8px; }
            .header-actions { justify-content: flex-start; flex-wrap: wrap; }
        }
        @media (max-width: 480px) {
            .bookmarks-grid {
                grid-template-columns: 1fr 1fr;
            }
            .main-header h1 { font-size: 19px; }
            .search-bar { flex-direction: column; align-items: stretch; }
            .search-bar .shortcut { align-self: flex-end; }
            .upload-zone { min-height: 220px; padding: 24px 12px; }
        }
        @media (max-width: 380px) {
            .bookmarks-grid { grid-template-columns: 1fr; }
        }

        /* toast 轻提示 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            box-shadow: var(--shadow-hover);
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="app" id="app">
        <!-- 头部 -->
        <header class="header">
            <div class="header-brand">
                <span class="logo">⌘</span>
                <span>书签导航</span>
                <span style="font-weight:400;font-size:13px;color:var(--text-muted);">· HelloGitHub 风格</span>
            </div>
            <div class="header-actions">
                <span class="badge" id="statsBadge">等待上传</span>
                <button class="btn" id="uploadBtn">📂 上传</button>
                <button class="btn btn-primary" id="exportBtn" disabled>⬇ 导出</button>
                <button class="btn" id="themeToggle" title="切换主题">🌓</button>
                <input type="file" id="fileInput" accept=".md,.markdown" style="display:none" />
            </div>
        </header>

        <!-- 上传区 -->
        <div class="upload-zone" id="uploadZone">
            <span class="icon-big">📄</span>
            <h2>上传 Markdown 书签</h2>
            <p>拖拽或点击上传 .md 文件</p>
            <p class="hint">格式：## 分类  - [标题](链接)</p>
            <div class="format">## 分类名  - [标题](url)</div>
        </div>

        <!-- 导航预览 -->
        <div class="nav-preview" id="navPreview">
            <div class="nav-body">
                <aside class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="title">📑 <span id="sidebarTitle">我的导航</span></div>
                        <div class="sub" id="sidebarBadge">0 个书签</div>
                    </div>
                    <div class="sidebar-search">
                        <input type="text" id="sidebarSearch" placeholder="过滤标签..." autocomplete="off" />
                    </div>
                    <nav class="sidebar-tags" id="sidebarTags"></nav>
                    <div class="sidebar-footer">
                        <span id="sidebarFooter">0 分类</span>
                        <span>✨</span>
                    </div>
                </aside>

                <main class="main-content" id="mainContent">
                    <div class="main-header">
                        <h1>⭐ 我的书签</h1>
                        <p>收纳 · 探索 · 效率</p>
                    </div>

                    <div class="search-engines" id="searchEngines">
                        <span class="label">🔍 搜索：</span>
                    </div>

                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="搜索书签标题或域名..." autocomplete="off" />
                        <span class="shortcut">⌘K</span>
                    </div>

                    <div id="bookmarksContainer"></div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  工具函数
        // ================================================================
        function escapeHTML(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function md5(str) { let h = 0; for (let i = 0; i < str.length; i++) { const c = str.charCodeAt(i); h = ((h << 5) - h) + c; h = h & h; } return Math.abs(h).toString(16).padStart(8, '0'); }

        function getColor(cat) {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffcc5c', '#ff6f69', '#88d8b0', '#b5a6e0', '#ffb347', '#5f9ea0', '#e07a5f', '#81b29a', '#f2cc8f', '#3d5a80', '#ee6c4d', '#6b4e71', '#2a9d8f', '#e76f51', '#f4a261', '#264653'];
            const idx = parseInt(md5(cat).slice(0, 8), 16) % colors.length;
            return colors[idx];
        }

        function getDomain(url) { try { let h = new URL(url).hostname; if (h.startsWith('www.')) h = h.slice(4); return h; } catch { return url.split('/')[0] || ''; } }

        function getFavicon(url) { try { let h = new URL(url).hostname; if (h.startsWith('www.')) h = h.slice(4); return `https://api.lcll.cc/favicon?host=${h}`; } catch { return ''; } }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast' + (type === 'error' ? ' error' : '');
            void el.offsetWidth;
            el.classList.add('show');
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.remove('show'), 2400);
        }

        // ================================================================
        //  Markdown 解析
        // ================================================================
        function parseBookmarks(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            let category = '';
            for (let i = 0; i < lines.length; i++) {
                let l = lines[i].trim();
                if (l.startsWith('## ')) { category = l.slice(3).trim(); continue; }
                const m = l.match(/- \[([^\]]+)\]\(([^)]+)\)/);
                if (m && category) { result.push({ category, title: m[1].trim(), url: m[2].trim() }); continue; }
                if (l === '-' && i + 1 < lines.length) {
                    const n = lines[i + 1].trim();
                    const m2 = n.match(/\[([^\]]+)\]\(([^)]+)\)/);
                    if (m2 && category) { result.push({ category, title: m2[1].trim(), url: m2[2].trim() }); i++; continue; }
                }
                const alt = l.match(/^-?\s*\[([^\]]+)\]\(([^)]+)\)/);
                if (alt && category) { result.push({ category, title: alt[1].trim(), url: alt[2].trim() }); }
            }
            return result;
        }

        // ================================================================
        //  搜索引擎 (精简)
        // ================================================================
        const ENGINES = [
            { name: 'Google', url: 'https://www.google.com/search?q=', icon: 'https://is1-ssl.mzstatic.com/image/thumb/PurpleSource221/v4/1f/cb/2a/1fcb2aab-332d-b5ed-bdec-11843b22480c/Placeholder.mill/48x48bb-75.webp' },
            { name: 'Bing', url: 'https://cn.bing.com/search?q=', icon: 'https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/13/f6/f2/13f6f204-d41c-e87e-9f2d-6763eed5c453/AppIcon-0-1x_U007epad-0-1-0-0-85-220-0.png/48x48ia-75.webp' },
            { name: 'Baidu', url: 'https://kaifa.baidu.com/searchPage?wd=', icon: 'https://is1-ssl.mzstatic.com/image/thumb/PurpleSource221/v4/b2/15/dd/b215ddb6-7657-6d5d-be18-a1d4ae5ffcfa/Placeholder.mill/48x48bb-75.webp' },
            { name: 'GitHub', url: 'https://github.com/search?q=', icon: 'https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/e5/24/6e/e5246ef1-4139-5811-732c-96b935c52715/AppIcon-0-0-1x_U007emarketing-0-9-0-0-sRGB-85-220.png/48x48ia-75.webp' },
            { name: 'Bilibili', url: 'https://search.bilibili.com/all?keyword=', icon: 'https://is1-ssl.mzstatic.com/image/thumb/PurpleSource221/v4/94/56/7c/94567ccc-e458-328c-0974-3700f75c4cd1/Placeholder.mill/48x48bb-75.webp' },
        ];

        // ================================================================
        //  状态
        // ================================================================
        let bookmarks = [];
        let title = '我的导航';
        let selectedEngine = localStorage.getItem('selectedEngine') || 'https://www.google.com/search?q=';
        let theme = localStorage.getItem('theme') || 'light';

        // ================================================================
        //  跳转分类 (核心)
        // ================================================================
        function jumpToCategory(catName) {
            document.querySelectorAll('.bookmark-card.highlight').forEach(el => el.classList.remove('highlight'));
            document.querySelectorAll('.category-section.targeted').forEach(el => el.classList.remove('targeted'));

            const target = document.getElementById('cat-' + catName);
            if (!target) { showToast('分类未找到', 'error'); return; }

            const input = document.getElementById('searchInput');
            if (input) { input.value = ''; filterBookmarks(''); }

            target.classList.remove('hidden');
            const cards = target.querySelectorAll('.bookmark-card');
            cards.forEach(c => c.classList.remove('hidden'));

            cards.forEach((c, i) => setTimeout(() => c.classList.add('highlight'), i * 70));
            target.classList.add('targeted');

            const top = target.getBoundingClientRect().top + window.scrollY - 10;
            window.scrollTo({ top, behavior: 'smooth' });

            document.querySelectorAll('.sidebar-tag').forEach(t => t.classList.toggle('active', t.dataset.category === catName));

            setTimeout(() => cards.forEach(c => c.classList.remove('highlight')), 4000);
            showToast(`📌 跳转至 "${catName}" (${cards.length} 个书签)`, '');
        }

        // ================================================================
        //  渲染
        // ================================================================
        function render(data, name) {
            bookmarks = data;
            title = name || '我的导航';

            const cats = {};
            for (const b of bookmarks) { if (!cats[b.category]) cats[b.category] = []; cats[b.category].push(b); }
            const catNames = Object.keys(cats);
            const colors = {};
            for (const c of catNames) colors[c] = getColor(c);

            // 统计
            document.getElementById('statsBadge').textContent = `${bookmarks.length} 个书签 · ${catNames.length} 分类`;
            document.getElementById('sidebarBadge').textContent = `${bookmarks.length} 个书签`;
            document.getElementById('sidebarFooter').textContent = `${catNames.length} 分类`;
            document.getElementById('sidebarTitle').textContent = title;

            // 侧边栏
            const sidebarTags = document.getElementById('sidebarTags');
            sidebarTags.innerHTML = '';
            for (const c of catNames) {
                const a = document.createElement('a');
                a.className = 'sidebar-tag';
                a.href = '#cat-' + c;
                a.dataset.category = c;
                a.innerHTML = `
                    <span class="tag-dot" style="background:${colors[c]}"></span>
                    <span class="tag-name">${escapeHTML(c)}</span>
                    <span class="tag-count">${cats[c].length}</span>
                `;
                a.addEventListener('click', e => { e.preventDefault(); jumpToCategory(c); });
                sidebarTags.appendChild(a);
            }

            // 搜索引擎
            const seContainer = document.getElementById('searchEngines');
            seContainer.innerHTML = '<span class="label">🔍 搜索：</span>';
            for (const e of ENGINES) {
                const btn = document.createElement('button');
                btn.className = 'search-btn' + (e.url === selectedEngine ? ' active' : '');
                btn.dataset.engine = e.url;
                btn.innerHTML = `
                    <img src="${e.icon}" class="search-icon" onerror="this.style.display='none';this.parentElement.innerHTML+='<span class=\\'si-fallback\\'>${e.name[0]}</span>'">
                    <span>${e.name}</span>
                `;
                btn.addEventListener('click', function(ev) {
                    ev.stopPropagation();
                    const u = this.dataset.engine;
                    if (u) {
                        selectedEngine = u;
                        localStorage.setItem('selectedEngine', u);
                        document.querySelectorAll('.search-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        const inp = document.getElementById('searchInput');
                        if (inp && inp.value.trim()) window.open(selectedEngine + encodeURIComponent(inp.value.trim()),
                        '_blank');
                    }
                });
                seContainer.appendChild(btn);
            }

            // 书签内容
            const container = document.getElementById('bookmarksContainer');
            container.innerHTML = '';
            for (const c of catNames) {
                const items = cats[c];
                const section = document.createElement('section');
                section.className = 'category-section';
                section.id = 'cat-' + c;

                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <span class="category-dot" style="background:${colors[c]}"></span>
                    <span class="category-title">${escapeHTML(c)}</span>
                    <span class="category-count">${items.length}</span>
                `;
                section.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'bookmarks-grid';

                for (const bm of items) {
                    const fav = getFavicon(bm.url);
                    const domain = getDomain(bm.url);
                    const card = document.createElement('div');
                    card.className = 'bookmark-card';
                    card.dataset.title = bm.title.toLowerCase();
                    card.dataset.domain = domain.toLowerCase();

                    card.innerHTML = `
                        <a href="${escapeHTML(bm.url)}" target="_blank" rel="noopener" class="card-link">
                            <div class="card-icon">
                                <img src="${escapeHTML(fav)}" alt="" onerror="this.parentElement.innerHTML='<span class=\\'fallback-icon\\'>📄</span>'">
                            </div>
                            <div class="card-content">
                                <div class="card-title">${escapeHTML(bm.title)}</div>
                                <div class="card-domain">${escapeHTML(domain)}</div>
                            </div>
                        </a>
                    `;
                    grid.appendChild(card);
                }
                section.appendChild(grid);
                container.appendChild(section);
            }

            document.getElementById('uploadZone').style.display = 'none';
            document.getElementById('navPreview').classList.add('visible');
            document.getElementById('exportBtn').disabled = false;

            filterBookmarks('');
            const first = document.querySelector('.sidebar-tag');
            if (first) first.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ================================================================
        //  过滤
        // ================================================================
        function filterBookmarks(kw) {
            const key = kw.toLowerCase().trim();
            const sections = document.querySelectorAll('.category-section');
            let total = 0;
            sections.forEach(sec => {
                const cards = sec.querySelectorAll('.bookmark-card');
                let match = 0;
                cards.forEach(c => {
                    const t = c.dataset.title || '';
                    const d = c.dataset.domain || '';
                    const ok = key === '' || t.includes(key) || d.includes(key);
                    c.classList.toggle('hidden', !ok);
                    if (ok) match++;
                });
                total += match;
                sec.classList.toggle('hidden', key !== '' && match === 0);
            });
            let no = document.getElementById('noResults');
            if (total === 0 && key !== '') {
                if (!no) {
                    no = document.createElement('div');
                    no.id = 'noResults';
                    no.className = 'no-results';
                    no.innerHTML = '<span style="font-size:28px;">🔍</span><p>没有匹配的书签</p>';
                    document.getElementById('bookmarksContainer').appendChild(no);
                }
            } else if (no) { no.remove(); }
        }

        // ================================================================
        //  导出 HTML
        // ================================================================
        function exportHTML() {
            if (!bookmarks.length) { showToast('没有书签可导出', 'error'); return; }
            // 复用当前样式，嵌入数据
            const style = document.querySelector('style').textContent;
            const cats = {};
            for (const b of bookmarks) { if (!cats[b.category]) cats[b.category] = []; cats[b.category].push(b); }
            let content = '';
            for (const c of Object.keys(cats)) {
                const items = cats[c];
                const col = getColor(c);
                let cards = '';
                for (const b of items) {
                    const domain = getDomain(b.url);
                    const fav = getFavicon(b.url);
                    cards += `
                        <div class="bookmark-card">
                            <a href="${escapeHTML(b.url)}" target="_blank" rel="noopener" class="card-link">
                                <div class="card-icon"><img src="${escapeHTML(fav)}" onerror="this.parentElement.innerHTML='<span class=\\'fallback-icon\\'>📄</span>'"></div>
                                <div class="card-content"><div class="card-title">${escapeHTML(b.title)}</div><div class="card-domain">${escapeHTML(domain)}</div></div>
                            </a>
                        </div>
                    `;
                }
                content += `
                    <section class="category-section" id="cat-${escapeHTML(c)}">
                        <div class="category-header"><span class="category-dot" style="background:${col}"></span><span class="category-title">${escapeHTML(c)}</span><span class="category-count">${items.length}</span></div>
                        <div class="bookmarks-grid">${cards}</div>
                    </section>
                `;
            }

            const html = `<!DOCTYPE html>
        <html lang="zh-CN">
        <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${escapeHTML(title)}</title><style>${style}.toolbar{display:none;}.upload-zone{display:none;}.nav-preview{display:flex!important;}</style></head>
        <body><div class="app"><div class="nav-preview visible"><div class="nav-body"><aside class="sidebar"><div class="sidebar-header"><div class="title">📑 ${escapeHTML(title)}</div><div class="sub">${bookmarks.length} 个书签</div></div><div class="sidebar-search"><input type="text" id="sidebarSearch" placeholder="过滤标签..."></div><nav class="sidebar-tags" id="sidebarTags">${Object.keys(cats).map(c => `<a class="sidebar-tag" onclick="jumpToCategory('${escapeHTML(c)}')"><span class="tag-dot" style="background:${getColor(c)}"></span><span class="tag-name">${escapeHTML(c)}</span><span class="tag-count">${cats[c].length}</span></a>`).join('')}</nav><div class="sidebar-footer"><span>${Object.keys(cats).length} 分类</span><span>✨</span></div></aside><main class="main-content"><div class="main-header"><h1>⭐ 我的书签</h1><p>收纳 · 探索 · 效率</p></div><div class="search-engines"><span class="label">🔍 搜索：</span>${ENGINES.map(e => `<button class="search-btn" data-engine="${e.url}"><img src="${e.icon}" class="search-icon" onerror="this.style.display='none'"><span>${e.name}</span></button>`).join('')}</div><div class="search-bar"><input type="text" id="searchInput" placeholder="搜索书签..."><span class="shortcut">⌘K</span></div><div id="bookmarksContainer">${content}</div></main></div></div></div>
        <script>
            function jumpToCategory(c){const el=document.getElementById('cat-'+c);if(!el)return;el.scrollIntoView({behavior:'smooth',block:'start'});}
            document.getElementById('searchInput').addEventListener('input',function(){const kw=this.value.toLowerCase().trim();document.querySelectorAll('.category-section').forEach(s=>{let m=0;s.querySelectorAll('.bookmark-card').forEach(c=>{const t=(c.dataset.title||'').toLowerCase(),d=(c.dataset.domain||'').toLowerCase(),ok=kw===''||t.includes(kw)||d.includes(kw);c.classList.toggle('hidden',!ok);if(ok)m++});s.classList.toggle('hidden',kw!==''&&m===0);});});
            document.querySelectorAll('.bookmark-card').forEach(c=>{const t=c.querySelector('.card-title'),d=c.querySelector('.card-domain');if(t)c.dataset.title=t.textContent.toLowerCase();if(d)c.dataset.domain=d.textContent.toLowerCase();});
            document.querySelectorAll('.search-btn').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const u=this.dataset.engine;if(u){const inp=document.getElementById('searchInput');if(inp&&inp.value.trim())window.open(u+encodeURIComponent(inp.value.trim()),'_blank');}});});
            document.getElementById('sidebarSearch').addEventListener('input',function(){const kw=this.value.toLowerCase().trim();document.querySelectorAll('.sidebar-tag').forEach(t=>{const n=t.querySelector('.tag-name').textContent.toLowerCase();t.style.display=(kw===''||n.includes(kw))?'flex':'none';});});
        <\/script>
        </body></html>`;

            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'nav.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('✅ 导出成功', '');
        }

        // ================================================================
        //  文件上传
        // ================================================================
        function handleFile(file) {
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            if (!['md', 'markdown'].includes(ext)) { showToast('请上传 .md 文件', 'error'); return; }
            const reader = new FileReader();
            reader.onload = e => {
                const data = parseBookmarks(e.target.result);
                if (!data.length) { showToast('未解析到书签，检查格式', 'error'); return; }
                const name = file.name.replace(/\.[^.]+$/, '') || '我的导航';
                render(data, name);
                showToast(`✅ 导入 ${data.length} 个书签`, '');
            };
            reader.readAsText(file);
        }

        // ================================================================
        //  主题切换
        // ================================================================
        function setTheme(t) {
            theme = t;
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
            document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
        }

        // ================================================================
        //  事件绑定
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const uploadZone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const exportBtn = document.getElementById('exportBtn');
            const searchInput = document.getElementById('searchInput');
            const sidebarSearch = document.getElementById('sidebarSearch');
            const themeBtn = document.getElementById('themeToggle');

            // 主题
            const savedTheme = localStorage.getItem('theme') || 'light';
            setTheme(savedTheme);

            themeBtn.addEventListener('click', () => setTheme(theme === 'dark' ? 'light' : 'dark'));

            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', function(e) { if (this.files.length) handleFile(this.files[0]);
                this.value = ''; });

            uploadZone.addEventListener('dragover', e => { e.preventDefault();
                uploadZone.style.borderColor = 'var(--accent)'; });
            uploadZone.addEventListener('dragleave', e => { e.preventDefault();
                uploadZone.style.borderColor = ''; });
            uploadZone.addEventListener('drop', e => { e.preventDefault();
                uploadZone.style.borderColor = ''; if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
            uploadZone.addEventListener('click', () => fileInput.click());

            exportBtn.addEventListener('click', exportHTML);

            searchInput.addEventListener('input', function() { filterBookmarks(this.value); });
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && this.value.trim()) {
                    window.open(selectedEngine + encodeURIComponent(this.value.trim()), '_blank');
                }
            });

            sidebarSearch.addEventListener('input', function() {
                const kw = this.value.toLowerCase().trim();
                document.querySelectorAll('.sidebar-tag').forEach(t => {
                    const n = t.querySelector('.tag-name').textContent.toLowerCase();
                    t.style.display = (kw === '' || n.includes(kw)) ? 'flex' : 'none';
                });
            });

            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault();
                    searchInput.focus();
                    searchInput.select(); }
                if (e.key === 'Escape') { searchInput.value = '';
                    filterBookmarks('');
                    searchInput.blur(); }
            });

            // 预设示例数据，便于展示
            const demo = [
                { category: '开发工具', title: 'GitHub', url: 'https://github.com' },
                { category: '开发工具', title: 'Stack Overflow', url: 'https://stackoverflow.com' },
                { category: '学习资源', title: 'MDN Web Docs', url: 'https://developer.mozilla.org' },
                { category: '学习资源', title: 'HelloGitHub', url: 'https://hellogithub.com' },
                { category: '设计素材', title: 'Dribbble', url: 'https://dribbble.com' },
            ];
            render(demo, '我的导航 · 示例');
            showToast('💡 上传 .md 文件替换示例数据', '');
        });
    </script>
</body>
</html>
